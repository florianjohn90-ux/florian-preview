<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florian John · Kinderfinanzen – Content-Freigabe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-accent {
    width: 4px;
    height: 40px;
    background: #8BC540;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .brand-text h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .brand-text p {
    font-size: 12px;
    color: #888;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
  }
  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-dot.approved { background: #22c55e; }
  .stat-dot.pending { background: #eab308; }
  .stat-dot.rejected { background: #ef4444; }
  .stat-count { font-weight: 800; }

  /* Header action buttons */
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-reload {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1.5px solid #e5e5e5;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    color: #333;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-reload:hover { background: #f5f5f5; border-color: #ccc; }
  .btn-gear {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1.5px solid #e5e5e5;
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    color: #555;
    font-size: 16px;
  }
  .btn-gear:hover { background: #f5f5f5; }

  /* FILTER */
  .filter-bar {
    background: #fafafa;
    border-bottom: 1px solid #e5e5e5;
    padding: 14px 32px;
  }
  .filter-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    background: #efefef;
    color: #555;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-pill:hover { background: #e0e0e0; }
  .filter-pill.active {
    background: #8BC540;
    color: #fff;
    border-color: #7ab035;
  }

  /* MAIN GRID */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } .main { padding: 16px; } .site-header { padding: 16px; } .filter-bar { padding: 12px 16px; } }

  /* CARD */
  .card {
    border: 1.5px solid #e5e5e5;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s;
    background: #fff;
  }
  .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
  .card.hidden { display: none; }

  /* THUMBNAIL */
  .thumb-container {
    position: relative;
    width: 100%;
    height: 260px;
    background: #111;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb-container img {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }
  .thumb-container video {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }
  .thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #aaa;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .thumb-placeholder svg { opacity: 0.4; }

  /* LOOP REEL TEXT OVERLAY (CSS simulation of ffmpeg drawtext) */
  .reel-wrap {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .reel-wrap video {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }
  .reel-scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.55) 80%, rgba(0,0,0,0.2) 100%);
    pointer-events: none;
  }
  .reel-brand {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 8px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.4px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    pointer-events: none;
  }
  .reel-text-block {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    padding: 0 10px;
    pointer-events: none;
  }
  .reel-line {
    display: block;
    font-size: 8.5px;
    font-weight: 700;
    text-align: center;
    line-height: 1.35;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
    white-space: pre-wrap;
    margin-bottom: 1px;
    color: #ffffff;
  }
  .reel-line.headline {
    font-size: 10px;
    font-weight: 900;
    color: #8BC540;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .reel-scene-gap { height: 7px; }

/* ── Glass Panel (Reel) ─────────────────────────────────────── */
.reel-glass-panel {
  position: absolute;
  left: 6px; right: 6px; top: 8px; bottom: 8px;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.30);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 4px 20px rgba(0,0,0,0.3);
  pointer-events: none;
  overflow: hidden;
}
.reel-glass-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, #4d7c14, transparent);
}
.reel-panel-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 10px 12px;
  overflow: hidden;
  text-align: center;
}
.reel-panel-brand {
  position: absolute;
  top: 7px; left: 0; right: 0;
  text-align: center;
  font-size: 5.5px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: rgba(30,50,10,0.5);
}
.reel-panel-title {
  font-size: 8px;
  font-weight: 900;
  text-transform: uppercase;
  line-height: 1.25;
  color: #1a1a1a;
  margin-bottom: 5px;
  font-family: 'Arial Black', sans-serif;
}
.reel-panel-divider {
  width: 20px; height: 2px;
  background: #4d7c14;
  border-radius: 1px;
  margin: 0 auto 6px;
  flex-shrink: 0;
}
.reel-sec-headline {
  display: block;
  font-size: 7px;
  font-weight: 900;
  text-transform: uppercase;
  color: #4d7c14;
  line-height: 1.3;
  margin-top: 7px;
  margin-bottom: 2px;
  font-family: 'Arial Black', sans-serif;
}
.reel-sec-body {
  display: block;
  font-size: 6px;
  font-weight: 700;
  font-family: Arial, sans-serif;
  color: #1a1a1a;
  line-height: 1.5;
}
/* Modal glass panel */
.modal-reel-glass {
  position: absolute;
  left: 8px; right: 8px; top: 10px; bottom: 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.30);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 6px 30px rgba(0,0,0,0.35);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 14px 16px;
  text-align: center;
}
.modal-reel-glass::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, transparent, #4d7c14, transparent);
}
.modal-glass-brand {
  position: absolute;
  top: 9px; left: 0; right: 0;
  text-align: center;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: rgba(30,50,10,0.5);
}
.modal-glass-title {
  font-size: 13px;
  font-weight: 900;
  text-transform: uppercase;
  line-height: 1.25;
  color: #1a1a1a;
  margin-bottom: 7px;
  font-family: 'Arial Black', sans-serif;
}
.modal-glass-divider {
  width: 36px; height: 3px;
  background: #4d7c14;
  border-radius: 2px;
  margin: 0 auto 9px;
  flex-shrink: 0;
}
.modal-glass-sec-headline {
  display: block;
  font-size: 10.5px;
  font-weight: 900;
  text-transform: uppercase;
  color: #4d7c14;
  line-height: 1.3;
  margin-top: 9px;
  margin-bottom: 3px;
  font-family: 'Arial Black', sans-serif;
}
.modal-glass-sec-body {
  display: block;
  font-size: 9px;
  font-weight: 700;
  font-family: Arial, sans-serif;
  color: #1a1a1a;
  line-height: 1.5;
}
.modal-glass-gap { height: 6px; flex-shrink: 0; }
/* Slider controls */
.reel-sliders {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}
.reel-slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.reel-slider-row label {
  color: #aaa;
  font-size: 11px;
  font-family: sans-serif;
  width: 130px;
  flex-shrink: 0;
}
.reel-slider-row input[type=range] {
  flex: 1;
  accent-color: #8BC540;
}
.reel-slider-row span {
  color: #8BC540;
  font-size: 11px;
  font-family: sans-serif;
  width: 40px;
  text-align: right;
}

  /* Modal overlay */
  .modal-reel-wrap {
    position: relative;
    display: inline-block;
    line-height: 0;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
  }
  .modal-reel-wrap video {
    display: block;
    max-height: 65vh;
    max-width: min(85vw, 380px);
    width: auto; height: auto;
  }
  .modal-reel-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.65) 18%, rgba(0,0,0,0.65) 92%, rgba(0,0,0,0.05) 100%);
    pointer-events: none;
    z-index: 1;
  }
  .modal-reel-brand {
    position: absolute; top: 10px; left: 12px;
    font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8); pointer-events: none;
    z-index: 2;
  }
  .modal-reel-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 12px; pointer-events: none; text-align: center;
    overflow: hidden;
    z-index: 2;
  }
  .modal-reel-text .reel-line { font-size: 8.5px; line-height: 1.4; }
  .modal-reel-text .reel-line.headline { font-size: 10px; line-height: 1.3; font-weight: 900; }
  .modal-reel-text .reel-scene-gap { height: 6px; flex-shrink: 0; }

  /* CAROUSEL SLIDESHOW */
  .slideshow {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slideshow img {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: none;
    background: #111;
  }
  .slideshow img.active { display: block; }
  .slide-nav {
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
  }
  .slide-btn {
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .slide-btn:hover { background: rgba(0,0,0,0.8); }
  .slide-indicator {
    background: rgba(0,0,0,0.55);
    color: #fff;
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }

  /* FORMAT BADGE */
  .badge-row {
    position: absolute;
    top: 10px;
    left: 10px;
    display: flex;
    gap: 6px;
    z-index: 5;
  }
  .format-badge {
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .fmt-loop_reel { background: #3B82F6; }
  .fmt-carousel { background: #8BC540; }
  .fmt-single_image { background: #F97316; }

  /* CARD BODY */
  .card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }
  .scheduled-time {
    font-size: 12px;
    color: #888;
    font-weight: 600;
  }
  .status-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .status-pending_approval { background: #fef9c3; color: #a16207; }
  .status-approved { background: #dcfce7; color: #166534; }
  .status-rejected { background: #fee2e2; color: #991b1b; }
  .status-posted { background: #f3f4f6; color: #6b7280; }

  .card-hook {
    font-size: 15px;
    font-weight: 800;
    line-height: 1.3;
    color: #111;
  }
  .scene-count {
    font-size: 12px;
    color: #8BC540;
    font-weight: 700;
  }
  .caption-preview {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }
  .caption-more {
    color: #8BC540;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
  }
  .caption-more:hover { text-decoration: underline; }

  .feedback-textarea {
    width: 100%;
    min-height: 68px;
    border: 1.5px solid #e5e5e5;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    resize: vertical;
    color: #333;
    transition: border-color 0.15s;
    outline: none;
  }
  .feedback-textarea:focus { border-color: #8BC540; }

  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-approve, .btn-reject {
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-approve { background: #8BC540; color: #fff; }
  .btn-approve:hover { opacity: 0.9; }
  .btn-reject { background: #ef4444; color: #fff; }
  .btn-reject:hover { opacity: 0.9; }
  .btn-approve:active, .btn-reject:active { transform: scale(0.98); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: #111;
    color: #fff;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    z-index: 300;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .card { cursor: pointer; }

  /* MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal-panel {
    background: #fff;
    border-radius: 18px;
    width: 100%;
    max-width: 92vw;
    max-height: 92vh;
    position: relative;
    box-shadow: 0 20px 80px rgba(0,0,0,0.4);
    animation: modalIn 0.18s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.45);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(0,0,0,0.7); }

  /* Modal content wrapper */
  .modal-content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* two-area body: media (left) + meta (right) */
  .modal-body {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1.5fr) minmax(280px, 1fr);
    gap: 0;
  }

  /* LEFT: media viewer */
  .modal-media-area {
    background: #0f0f10;
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
    padding: 16px;
    gap: 12px;
  }
  .modal-viewer {
    flex: 1;
    min-height: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-viewer img,
  .modal-viewer video {
    max-height: 70vh;
    max-width: 100%;
    width: auto;
    object-fit: contain;
    border-radius: 10px;
    display: block;
    background: #000;
  }
  .modal-viewer .scene-card {
    max-height: 70vh;
    overflow-y: auto;
    width: 100%;
    max-width: 420px;
  }
  .viewer-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.9);
    color: #111;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .viewer-arrow:hover { background: #fff; }
  .viewer-arrow:active { transform: translateY(-50%) scale(0.94); }
  .viewer-arrow.prev { left: 8px; }
  .viewer-arrow.next { right: 8px; }
  .viewer-counter {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    border-radius: 12px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 700;
    z-index: 5;
  }
  /* thumbnail strip */

// ── UTF-8-safe codec for GitHub-API base64 content ──────────────
// Every read of queue.json / ideas.json MUST use ghB64ToJson and every
// write MUST use jsonToGhB64. Decoding with bare atob() treats each UTF-8
// byte as a separate codepoint (ä → "Ã¤") and — because the corrupted array
// is later written straight back — bakes the mojibake permanently into the
// file. These two helpers are the single source of truth so the read and
// write paths can never drift apart again.
const ghB64ToJson = (c) => JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(c.replace(/\n/g, '')), x => x.charCodeAt(0))));
const jsonToGhB64 = (o) => btoa(unescape(encodeURIComponent(JSON.stringify(o, null, 2))));

const REPO = 'florianjohn90-ux/leadgen';
const BRANCH = 'claude/peaceful-maxwell-fq9rik';
const _T = (function () {
  // Token never lives in the published HTML (GitHub secret scanning blocks that).
  // It is supplied once via the URL fragment (#token=...) and then remembered
  // in localStorage so every later visit works without the fragment.
  let t = '';
  try {
    const m = (location.hash || '').match(/token=([^&]+)/);
    if (m) {
      t = decodeURIComponent(m[1]);
      localStorage.setItem('fj_gh_token', t);
      // strip the token out of the visible URL
      history.replaceState(null, '', location.pathname + location.search);
    } else {
      t = localStorage.getItem('fj_gh_token') || '';
    }
  } catch (e) { /* ignore */ }
  return t;
})();

let QUEUE = [...EMBEDDED_QUEUE];
let _qsha = null;
let activeFilter = 'all';
let openItemId = null;

// Format-aware status label. Only carousels generate images after content
// approval; reels/single images go straight to "ready to post".
function fmtStatus(item) {
  switch (item.status) {
    case 'pending_approval':        return 'Ausstehend';
    case 'approved':                return item.format === 'carousel'
                                      ? 'Inhalt ✓ · Bilder werden generiert…'
                                      : 'Freigegeben ✓ · wird gepostet';
    case 'images_pending_approval': return '🖼 Bilder prüfen';
    case 'images_approved':         return 'Bereit zum Posten';
    case 'revision_requested':      return '✏️ Kritik erhalten · wird überarbeitet';
    case 'rejected':                return 'Abgelehnt';
    case 'posted':                  return 'Gepostet';
    default:                        return item.status;
  }
}

// ── Fetch fresh queue from GitHub API ──

async function tryFetchFresh() {
  if (!_T) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/queue.json?ref=${BRANCH}`, {
      headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) return;
    const d = await r.json();
    _qsha = d.sha;
    QUEUE = ghB64ToJson(d.content);
    renderAll();
  } catch(e) { /* silently fall back to embedded */ }
}

document.getElementById('btnReload').addEventListener('click', () => { tryFetchFresh().then(() => renderAll()); });

// ── Render ──────────────────────────────────────────────────────

function renderAll() {
  renderStats();
  renderGrid();
}

function renderStats() {
  const approved = QUEUE.filter(i => i.status === 'approved').length;
  const pending = QUEUE.filter(i => i.status === 'pending_approval').length;
  const rejected = QUEUE.filter(i => i.status === 'rejected').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-dot approved"></div><span class="stat-count">${approved}</span> Freigegeben</div>
    <div class="stat"><div class="stat-dot pending"></div><span class="stat-count">${pending}</span> Ausstehend</div>
    <div class="stat"><div class="stat-dot rejected"></div><span class="stat-count">${rejected}</span> Abgelehnt</div>
  `;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  QUEUE.forEach(item => {
    const card = buildCard(item);
    if (activeFilter !== 'all' && item.status !== activeFilter) card.classList.add('hidden');
    grid.appendChild(card);
  });
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', timeZone: 'Europe/Berlin' }) +
    ' · ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }) + ' Uhr';
}

function buildCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = item.id;

  // Thumbnail
  const thumb = document.createElement('div');
  thumb.className = 'thumb-container';
  thumb.innerHTML = buildThumbHTML(item);

  const badgeRow = document.createElement('div');
  badgeRow.className = 'badge-row';
  badgeRow.innerHTML = `<span class="format-badge fmt-${item.format}">${item.format.replace('_', ' ')}</span>`;
  thumb.appendChild(badgeRow);

  const body = document.createElement('div');
  body.className = 'card-body';

  const statusLabel = {
    pending_approval:       'Ausstehend',
    approved:               'Inhalt ✓ · Bilder werden generiert…',
    images_pending_approval:'🖼 Bilder prüfen',
    images_approved:        'Bereit zum Posten',
    rejected:               'Abgelehnt',
    posted:                 'Gepostet',
  };
  const captionShort = (item.caption || '').slice(0, 100) + ((item.caption || '').length > 100 ? '…' : '');

  const isImageStep = item.status === 'images_pending_approval';
  const isActionable = item.status === 'pending_approval' || item.status === 'images_pending_approval';

  body.innerHTML = `
    <div class="card-meta">
      <span class="scheduled-time">${fmtTime(item.scheduledFor)}</span>
      <span class="status-badge status-${item.status}">${fmtStatus(item)}</span>
    </div>
    <div class="card-hook">${item.hook || ''}</div>
    ${item.loop_scenes ? `<div class="scene-count">${item.loop_scenes.length} Szenen</div>` : ''}
    <div class="caption-preview">${captionShort}</div>
    ${isActionable ? `
    <div class="action-row">
      <button class="btn-approve" data-action="${isImageStep ? 'approve_images' : 'approve'}" data-id="${item.id}">
        ${isImageStep ? '🖼 Bilder freigeben' : '✓ Freigeben'}
      </button>
      <button class="btn-reject" data-action="reject" data-id="${item.id}">✗ Ablehnen</button>
    </div>` : ''}
  `;

  card.appendChild(thumb);
  card.appendChild(body);

  card.addEventListener('click', e => {
    if (e.target.closest('[data-action]')) return;
    openModal(item.id);
  });

  body.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const action = btn.dataset.action;
      if (action === 'approve') await updateStatus(item.id, 'approved');
      else if (action === 'approve_images') await updateStatus(item.id, 'images_approved');
      else if (action === 'reject') await updateStatus(item.id, 'rejected');
    });
  });

  return card;
}

function buildThumbHTML(item) {
  if (item.format === 'loop_reel' && (item.broll_url || item.video_url)) {
    const url = item.broll_url || item.video_url;
    const opacity = item.panel_opacity ?? 0.56;
    const blur = item.panel_blur ?? 4;
    const dark = item.panel_text_dark !== false;
    const scenes = item.loop_scenes || [];
    const panelBg = dark
      ? `rgba(255,255,255,${opacity})`
      : `rgba(0,0,0,${opacity})`;
    return `
      <div class="reel-wrap" style="width:100%;height:100%;">
        <video src="${url}" autoplay muted loop playsinline style="height:100%;width:auto;max-width:100%;object-fit:contain;display:block;"></video>
        <div class="reel-glass-panel" style="backdrop-filter:blur(${blur}px);-webkit-backdrop-filter:blur(${blur}px);background:${panelBg};">
          <div class="reel-panel-inner">
            <div class="reel-panel-brand">FLORIAN JOHN · KINDERFINANZEN</div>
            <div class="reel-panel-title">${item.hook || ''}</div>
            <div class="reel-panel-divider"></div>
            ${scenes.slice(0, 2).map(s => `
              <span class="reel-sec-headline">${s.headline}</span>
              <span class="reel-sec-body">${(s.body || '').split('\n')[0]}</span>
            `).join('')}
          </div>
        </div>
      </div>`;
  }
  if (item.format === 'carousel' && item.asset_urls && item.asset_urls.length > 0) {
    const imgs = item.asset_urls.map((u, i) =>
      `<img src="${u}" class="${i === 0 ? 'active' : ''}" alt="Slide ${i+1}">`
    ).join('');
    return `
      <div class="slideshow" style="width:100%;height:100%;">
        ${imgs}
        <div class="slide-nav">
          <button class="slide-btn" onclick="event.stopPropagation();slideCard(this,-1)">&#8249;</button>
          <span class="slide-indicator">1/${item.asset_urls.length}</span>
          <button class="slide-btn" onclick="event.stopPropagation();slideCard(this,1)">&#8250;</button>
        </div>
      </div>`;
  }
  // Placeholder
  const icons = { loop_reel: '▶', carousel: '⊟', single_image: '🖼' };
  return `<div class="thumb-placeholder"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span>${icons[item.format] || ''} ${item.format}</span></div>`;
}

function slideCard(btn, dir) {
  const slideshow = btn.closest('.slideshow');
  const imgs = slideshow.querySelectorAll('img');
  const indicator = slideshow.querySelector('.slide-indicator');
  let cur = Array.from(imgs).findIndex(i => i.classList.contains('active'));
  imgs[cur].classList.remove('active');
  cur = (cur + dir + imgs.length) % imgs.length;
  imgs[cur].classList.add('active');
  indicator.textContent = `${cur+1}/${imgs.length}`;
}

// ── Status Update ───────────────────────────────────────────────

async function updateStatus(id, newStatus, feedback) {
  const idx = QUEUE.findIndex(i => i.id === id);
  if (idx === -1) return;

  const item = QUEUE[idx];
  item.status = newStatus;
  if (feedback) item.feedback = feedback;
  if (newStatus === 'approved') item.approvedAt = new Date().toISOString();
  if (newStatus === 'images_approved') item.imagesApprovedAt = new Date().toISOString();
  if (newStatus === 'rejected') item.rejectedAt = new Date().toISOString();
  renderAll();
  if (openItemId === id) openModal(id);
  showToast('Speichern…');

  try {
    if (!_qsha) {
      const r0 = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/queue.json?ref=${BRANCH}`, {
        headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json' }
      });
      const d0 = await r0.json();
      _qsha = d0.sha;
    }
    const content = jsonToGhB64(QUEUE);
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/queue.json`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `chore: ${id} → ${newStatus}`, content, sha: _qsha, branch: BRANCH })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message);
    _qsha = d.content.sha;

    // Carousel content approved → trigger image generation workflow automatically
    if (newStatus === 'approved' && item.format === 'carousel') {
      showToast('✓ Inhalt freigegeben — Bilder werden generiert…');
      fetch(`https://api.github.com/repos/${REPO}/actions/workflows/generate-carousel-images.yml/dispatches`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ ref: BRANCH })
      }).catch(() => {}); // fire and forget
    } else if (newStatus === 'images_approved') {
      showToast('✓ Bilder freigegeben — wird zum nächsten Slot gepostet');
    } else if (newStatus === 'rejected') {
      showToast('✓ Abgelehnt');
    } else {
      showToast('✓ Gespeichert');
    }
  } catch(e) {
    showToast('Fehler: ' + e.message);
  }
}

// ── Submit critique → mark for rework ──────────────────────────
// Saves the feedback, sets status to "revision_requested" and kicks off the
// content-generation workflow, which reworks the post and sets it back to
// "pending_approval" for a fresh review.
async function submitRevision(id, feedback) {
  const idx = QUEUE.findIndex(i => i.id === id);
  if (idx === -1) return;
  const item = QUEUE[idx];
  item.status = 'revision_requested';
  item.feedback = feedback;
  item.revisionRequestedAt = new Date().toISOString();
  renderAll();
  if (openItemId === id) openModal(id);
  showToast('Kritik wird abgeschickt…');

  try {
    if (!_qsha) {
      const r0 = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/queue.json?ref=${BRANCH}`, {
        headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json' }
      });
      _qsha = (await r0.json()).sha;
    }
    const content = jsonToGhB64(QUEUE);
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/queue.json`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `revise: ${id}`, content, sha: _qsha, branch: BRANCH })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message);
    _qsha = d.content.sha;

    // Kick off the rework workflow automatically
    fetch(`https://api.github.com/repos/${REPO}/actions/workflows/revise-content.yml/dispatches`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: BRANCH })
    }).catch(() => {});

    showToast('✓ Kritik angekommen — Post wird überarbeitet und kommt zurück zur Prüfung');
  } catch (e) {
    showToast('Fehler: ' + e.message);
  }
}

// ── Toast ───────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Filter ──────────────────────────────────────────────────────

document.getElementById('filterBar').addEventListener('click', e => {
  const pill = e.target.closest('.filter-pill');
  if (!pill) return;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeFilter = pill.dataset.filter;

  const grid = document.getElementById('grid');
  const ideasPanel = document.getElementById('ideasPanel');

  if (activeFilter === 'ideas') {
    grid.style.display = 'none';
    ideasPanel.classList.add('show');
    loadIdeas();
    return;
  }

  ideasPanel.classList.remove('show');
  grid.style.display = 'grid';
  document.querySelectorAll('.card[data-id]').forEach(card => {
    const item = QUEUE.find(i => i.id === card.dataset.id);
    if (!item) return;
    card.classList.toggle('hidden', activeFilter !== 'all' && item.status !== activeFilter);
  });
});

// ── Ideas ────────────────────────────────────────────────────────

let IDEAS = [];
let _isha = null;

async function loadIdeas() {
  const list = document.getElementById('ideasList');
  if (!_T) {
    if (list) list.innerHTML = '<p style="color:#bbb;font-size:14px">Token nicht verfügbar — bitte Seite über den Preview-Link öffnen.</p>';
    return;
  }
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/ideas.json?ref=${BRANCH}`, {
      headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (r.ok) {
      const d = await r.json();
      _isha = d.sha;
      IDEAS = ghB64ToJson(d.content);
    }
  } catch(e) { /* file not yet created */ }
  renderIdeas();
}

function renderIdeas() {
  const list = document.getElementById('ideasList');
  if (!list) return;
  if (IDEAS.length === 0) {
    list.innerHTML = '<p style="color:#bbb;font-size:14px">Noch keine Ideen eingereicht.</p>';
    return;
  }
  list.innerHTML = [...IDEAS].reverse().map(idea => `
    <div class="idea-item ${idea.status === 'processed' ? 'idea-processed' : ''}">
      <div class="idea-meta">
        <span class="idea-format">${idea.format_hint === 'carousel' ? 'Karussell' : idea.format_hint === 'loop_reel' ? 'Loop-Reel' : 'Auto'}</span>
        <span class="idea-status ${idea.status === 'processed' ? 'done' : ''}">${idea.status === 'pending' ? '⏳ Ausstehend' : idea.status === 'processed' ? '✓ Verarbeitet' : idea.status}</span>
        <span class="idea-date">${new Date(idea.submittedAt).toLocaleDateString('de-DE')}</span>
      </div>
      <p class="idea-text">${idea.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
    </div>
  `).join('');
}

document.getElementById('btnSubmitIdea').addEventListener('click', async () => {
  const text = document.getElementById('ideaText').value.trim();
  if (!text) { showToast('Bitte erst eine Idee eingeben.'); return; }
  if (!_T) { showToast('Token nicht verfügbar.'); return; }

  const fmt = document.getElementById('ideaFormat').value;
  const idea = { id: `idea-${Date.now()}`, text, format_hint: fmt, submittedAt: new Date().toISOString(), status: 'pending' };

  if (!_isha) {
    try {
      const r0 = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/ideas.json?ref=${BRANCH}`, {
        headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (r0.ok) { const d0 = await r0.json(); _isha = d0.sha; IDEAS = ghB64ToJson(d0.content); }
    } catch(e) { /* new file */ }
  }

  IDEAS.push(idea);
  const content = jsonToGhB64(IDEAS);
  showToast('Idee wird gespeichert…');
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/florian/content/ideas.json`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${_T}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `idea: ${idea.id}`, content, ...(_isha ? { sha: _isha } : {}), branch: BRANCH })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message);
    _isha = d.content.sha;
    document.getElementById('ideaText').value = '';
    showToast('✓ Idee eingereicht — wird morgen 04:00 Uhr verarbeitet');
    renderIdeas();
  } catch(e) {
    IDEAS.pop();
    showToast('Fehler: ' + e.message);
  }
});

// ── Modal ───────────────────────────────────────────────────────

function openModal(id) {
  openItemId = id;
  const item = QUEUE.find(i => i.id === id);
  if (!item) return;

  const content = document.getElementById('modalContent');
  content.innerHTML = buildModalHTML(item);

  // Wire up modal action buttons
  content.querySelectorAll('[data-modal-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.modalAction;
      const feedbackEl = content.querySelector('.modal-feedback');
      const feedback = feedbackEl ? feedbackEl.value.trim() : '';
      if (action === 'approve') await updateStatus(id, 'approved', feedback || undefined);
      else if (action === 'approve_images') await updateStatus(id, 'images_approved', feedback || undefined);
      else if (action === 'reject') await updateStatus(id, 'rejected', feedback || undefined);
      else if (action === 'revise') {
        if (!feedback) { showToast('Bitte erst deine Kritik eintippen.'); return; }
        await submitRevision(id, feedback);
      }
    });
  });

  // Sliders for loop_reel
  if (item.format === 'loop_reel') {
    const opSlider = content.querySelector('#sliderOpacity');
    const blurSlider = content.querySelector('#sliderBlur');
    const darkToggle = content.querySelector('#toggleDark');
    if (opSlider) {
      opSlider.addEventListener('input', () => {
        content.querySelector('#valOpacity').textContent = parseFloat(opSlider.value).toFixed(2);
        updateGlassPanel(content, item, parseFloat(opSlider.value), parseFloat(blurSlider.value), darkToggle && darkToggle.checked);
      });
    }
    if (blurSlider) {
      blurSlider.addEventListener('input', () => {
        content.querySelector('#valBlur').textContent = blurSlider.value;
        updateGlassPanel(content, item, parseFloat(opSlider.value), parseFloat(blurSlider.value), darkToggle && darkToggle.checked);
      });
    }
    if (darkToggle) {
      darkToggle.addEventListener('change', () => {
        updateGlassPanel(content, item, parseFloat(opSlider.value), parseFloat(blurSlider.value), darkToggle.checked);
      });
    }
  }

  document.getElementById('modalBackdrop').classList.add('show');
}

function updateGlassPanel(content, item, opacity, blur, dark) {
  const panel = content.querySelector('.modal-reel-glass');
  if (!panel) return;
  const bg = dark ? `rgba(255,255,255,${opacity})` : `rgba(0,0,0,${opacity})`;
  panel.style.backdropFilter = `blur(${blur}px)`;
  panel.style.webkitBackdropFilter = `blur(${blur}px)`;
  panel.style.background = bg;
  // update dark/light text classes
  const titles = panel.querySelectorAll('.modal-glass-title, .modal-glass-brand, .modal-glass-divider, .modal-glass-sec-body');
  titles.forEach(el => {
    el.style.color = dark ? '' : '#fff';
  });
}

          <span class="format-badge fmt-${item.format}">${item.format.replace('_', ' ')}</span>
          <span class="modal-time">${fmtTime(item.scheduledFor)}</span>
          <span class="status-badge status-${item.status}">${fmtStatus(item)}</span>
        </div>
        <div class="modal-hook">${item.hook || ''}</div>
        ${scenesHTML}
        ${item.caption && item.loop_scenes ? `<p class="modal-section-label">Caption</p><div class="modal-caption" style="flex:none;max-height:120px;">${item.caption}</div>` : ''}
        ${item.format === 'loop_reel' ? `
        <p class="modal-section-label" style="margin-top:12px">Panel-Einstellungen</p>
        <div class="reel-sliders">
          <div class="reel-slider-row">
            <label>Panel Deckkraft</label>
            <input type="range" id="sliderOpacity" min="0" max="1" step="0.01" value="${opacity}">
            <span id="valOpacity">${opacity.toFixed(2)}</span>
          </div>
          <div class="reel-slider-row">
            <label>Panel Blur (px)</label>
            <input type="range" id="sliderBlur" min="0" max="20" step="1" value="${blur}">
            <span id="valBlur">${blur}</span>
          </div>
          <div class="reel-slider-row">
            <label>Helles Panel</label>
            <input type="checkbox" id="toggleDark" ${dark ? 'checked' : ''}>
            <span id="valDark">${dark ? 'An' : 'Aus'}</span>
          </div>
        </div>` : ''}
      </div>
    </div>
    <div class="modal-footer">
      <textarea class="modal-feedback" id="modalFeedback" placeholder="Kritik / Änderungswunsch eingeben… (z.B. 'Kinderunfallversicherung raus')">${item.feedback || ''}</textarea>
      <div class="modal-actions">
        ${item.status === 'images_pending_approval'
          ? `<button class="btn-approve" data-modal-action="approve_images">🖼 Bilder freigeben</button>`
          : item.status === 'pending_approval'
            ? `<button class="btn-approve" data-modal-action="approve">✓ Inhalt freigeben</button>`
            : ''}
        <button class="btn-revise" data-modal-action="revise">✏️ Kritik abschicken &amp; überarbeiten</button>
        ${(item.status === 'pending_approval' || item.status === 'images_pending_approval')
          ? `<button class="btn-reject" data-modal-action="reject">✗ Ablehnen</button>`
          : ''}
      </div>
    </div>`;
}

let mviewIdx = 0;
window.mviewSlide = function(dir, total) {
  const old = document.getElementById('mview_' + mviewIdx);
  const oldThumb = document.querySelectorAll('.modal-thumb')[mviewIdx];
  if (old) old.style.display = 'none';
  if (oldThumb) oldThumb.classList.remove('active');
  mviewIdx = (mviewIdx + dir + total) % total;
  const nw = document.getElementById('mview_' + mviewIdx);
  const newThumb = document.querySelectorAll('.modal-thumb')[mviewIdx];
  if (nw) nw.style.display = 'block';
  if (newThumb) { newThumb.classList.add('active'); newThumb.scrollIntoView({ inline: 'nearest', behavior: 'smooth' }); }
  const counter = document.getElementById('mviewCounter');
  if (counter) counter.textContent = `${mviewIdx + 1} / ${total}`;
};
window.mviewGoto = function(idx, total) {
  window.mviewSlide(idx - mviewIdx, total === total ? total : total);
  // simpler: just set directly
  const old = document.getElementById('mview_' + mviewIdx);
  const oldThumb = document.querySelectorAll('.modal-thumb')[mviewIdx];
  if (old) old.style.display = 'none';
  if (oldThumb) oldThumb.classList.remove('active');
  mviewIdx = idx;
  const nw = document.getElementById('mview_' + mviewIdx);
  const newThumb = document.querySelectorAll('.modal-thumb')[mviewIdx];
  if (nw) nw.style.display = 'block';
  if (newThumb) newThumb.classList.add('active');
  const counter = document.getElementById('mviewCounter');
  if (counter) counter.textContent = `${mviewIdx + 1} / ${total}`;
};

// ── Modal close ─────────────────────────────────────────────────

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
function closeModal() {
  openItemId = null;
  mviewIdx = 0;
  document.getElementById('modalBackdrop').classList.remove('show');
}

// ── Boot ────────────────────────────────────────────────────────

QUEUE = [...EMBEDDED_QUEUE];
document.getElementById('loadingState').style.display = 'none';
document.getElementById('grid').style.display = 'grid';
renderAll();
tryFetchFresh(); // optional enhancement if PAT exists

// One-time token bootstrap: if no token is present yet, show a paste banner.
// After pasting once it is stored in localStorage and never asked again.
(function tokenBanner() {
  if (_T) return;
  const bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#111;color:#fff;'
    + 'padding:14px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;'
    + 'font:14px/1.4 Inter,system-ui,sans-serif;box-shadow:0 -2px 12px rgba(0,0,0,.3)';
  bar.innerHTML = '<span style="flex:1;min-width:220px">🔑 Einmalig: Token einfügen, damit Freigaben gespeichert werden. '
    + 'Danach nie wieder nötig.</span>'
    + '<input id="tokInput" type="password" placeholder="ghp_… / github_pat_…" '
    + 'style="flex:2;min-width:240px;padding:8px 10px;border-radius:8px;border:1px solid #444;background:#222;color:#fff">'
    + '<button id="tokSave" style="padding:8px 16px;border:0;border-radius:8px;background:#8BC540;color:#fff;font-weight:700;cursor:pointer">Speichern</button>';
  document.body.appendChild(bar);
  document.getElementById('tokSave').addEventListener('click', () => {
    const v = document.getElementById('tokInput').value.trim();
    if (!v) return;
    try { localStorage.setItem('fj_gh_token', v); } catch (e) {}
    location.reload();
  });
})();

(function copyTokenButton() {
  const t = localStorage.getItem('fj_gh_token');
  if (!t) return;
  const btn = document.createElement('button');
  btn.textContent = '🔑 Token kopieren';
  btn.title = 'Token in Zwischenablage kopieren (für anderen Browser)';
  btn.style.cssText = 'position:fixed;bottom:14px;right:14px;z-index:9998;padding:8px 14px;'
    + 'border:0;border-radius:8px;background:#444;color:#fff;font:13px Inter,system-ui,sans-serif;cursor:pointer;opacity:0.7';
  btn.addEventListener('mouseenter', () => btn.style.opacity = '1');
  btn.addEventListener('mouseleave', () => btn.style.opacity = '0.7');
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(t).then(() => {
      btn.textContent = '✓ Kopiert!';
      setTimeout(() => { btn.textContent = '🔑 Token kopieren'; }, 2000);
    });
  });
  document.body.appendChild(btn);
})();
</script>
